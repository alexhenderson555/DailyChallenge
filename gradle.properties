org.gradle.jvmTarget=17
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Память: 3GB — Kotlin in-process, один JVM; хватает на mergeExtDexDebug
org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
# Kotlin без отдельного демона — один процесс, меньше OOM и "daemon lost"
kotlin.compiler.execution.strategy=in-process
org.gradle.parallel=true
